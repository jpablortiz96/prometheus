services:
  - type: web
    name: prometheus-api
    runtime: python
    rootDir: .
    buildCommand: bash scripts/render_build_api.sh
    startCommand: bash scripts/render_start_api.sh
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: GO_VERSION
        value: 1.23.4
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_REASONING_MODEL
        value: gemini-3.1-pro-preview
      - key: GEMINI_FAST_MODEL
        value: gemini-3-flash-preview
      - key: GEMINI_LITE_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: LOBSTERTRAP_ENABLED
        value: "true"
      - key: LOBSTERTRAP_BIN
        value: /opt/render/project/src/tools/lobstertrap/lobstertrap
      - key: LOBSTERTRAP_POLICY_PATH
        value: /opt/render/project/src/infra/lobstertrap/prometheus_policy.yaml
      - key: LOBSTERTRAP_TIMEOUT_SECONDS
        value: "5"
      - key: CORS_ALLOWED_ORIGINS
        value: https://YOUR-VERCEL-APP.vercel.app
      - key: CORS_ALLOWED_ORIGIN_REGEX
        value: https://.*\\.vercel\\.app
