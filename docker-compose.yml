version: "3.9"

services:
  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: node:22-bullseye
    working_dir: /workspace
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    command: >
      sh -c "corepack enable &&
      pnpm install &&
      pnpm --filter @prometheus/web dev --hostname 0.0.0.0"
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - api
